<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTM Imports · Estoque de Celulares</title>
  <meta name="description" content="Estoque atualizado em tempo real de iPhones e celulares Android. Atendimento via WhatsApp.">
  <meta property="og:title" content="FTM Imports · Estoque de Celulares">
  <meta property="og:description" content="Atualizado em tempo real · iPhones e Androids · WhatsApp">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%2280%22 height=%2280%22 x=%2210%22 y=%2210%22 fill=%22%23F0C020%22 stroke=%22%23121212%22 stroke-width=%228%22/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            bg: '#F0F0F0',
            ink: '#121212',
            blue: '#1040C0',
            yellow: '#F0C020',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; background: #F0F0F0; color: #121212; }
    /* Press effect for buttons (translate + remove shadow) */
    .press { transition: transform .15s ease-out, box-shadow .15s ease-out, background-color .15s ease-out; }
    .press:active { transform: translate(2px, 2px); box-shadow: none !important; }
    /* Card hover lift */
    .lift { transition: transform .2s ease-out, box-shadow .2s ease-out; }
    .lift:hover { transform: translate(-2px, -4px); box-shadow: 12px 12px 0 0 #121212; }
    /* Dot grid background pattern for header */
    .dot-grid {
      background-image: radial-gradient(#12121215 1.5px, transparent 1.5px);
      background-size: 18px 18px;
    }
    /* Hide scrollbar on overflow scroll  */
    .scroll-clean::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen bg-bg text-ink">

  <!-- ============ HEADER ============ -->
  <header class="bg-white border-b-4 border-ink sticky top-0 z-50 dot-grid">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6">

      <!-- Logo + Title row -->
      <div class="flex items-center gap-4 sm:gap-6 mb-4 sm:mb-6">
        <!-- LOGO FTM (yellow front + blue 3D + black outlines) -->
        <a href="/" class="flex-shrink-0 group">
          <svg viewBox="0 0 130 80" class="h-14 sm:h-16 lg:h-20 w-auto" xmlns="http://www.w3.org/2000/svg" aria-label="FTM">
            <!-- Blue depth layer (offset behind) -->
            <text x="16" y="66" font-family="Outfit, sans-serif" font-weight="900" font-size="72" letter-spacing="-4"
                  fill="#1040C0" stroke="#121212" stroke-width="2" stroke-linejoin="round">FTM</text>
            <!-- Yellow front layer -->
            <text x="10" y="60" font-family="Outfit, sans-serif" font-weight="900" font-size="72" letter-spacing="-4"
                  fill="#F0C020" stroke="#121212" stroke-width="2" stroke-linejoin="round">FTM</text>
          </svg>
        </a>

        <div class="flex-1 min-w-0">
          <h1 class="text-2xl sm:text-3xl lg:text-5xl font-black uppercase leading-[0.9] tracking-tighter">
            Estoque de<br>Celulares
          </h1>
          <p class="text-[10px] sm:text-xs font-bold uppercase tracking-[0.25em] mt-1 sm:mt-2 text-ink/70" id="subtitle">
            Atualizado em tempo real
          </p>
        </div>
      </div>

      <!-- Toggle Apple / Xiaomi -->
      <div class="grid grid-cols-2 gap-2 sm:gap-3 mb-3 sm:mb-4">
        <button id="btn-apple" onclick="setBrand('apple')"
                class="press bg-yellow text-ink border-2 sm:border-4 border-ink shadow-[3px_3px_0px_0px_#121212] sm:shadow-[4px_4px_0px_0px_#121212] py-2.5 sm:py-3 px-3 font-black uppercase tracking-wider text-sm sm:text-base">
          🍎 Apple
        </button>
        <button id="btn-xiaomi" onclick="setBrand('xiaomi')"
                class="press bg-white text-ink border-2 sm:border-4 border-ink shadow-[3px_3px_0px_0px_#121212] sm:shadow-[4px_4px_0px_0px_#121212] py-2.5 sm:py-3 px-3 font-black uppercase tracking-wider text-sm sm:text-base">
          📱 Xiaomi
        </button>
      </div>

      <!-- Search -->
      <div class="relative">
        <input type="search" id="search" oninput="render()"
               placeholder="BUSCAR MODELO, COR..."
               class="w-full px-4 py-2.5 sm:py-3 bg-white border-2 sm:border-4 border-ink font-bold uppercase tracking-wide text-sm sm:text-base placeholder:text-ink/40 focus:outline-none focus:shadow-[4px_4px_0px_0px_#121212] transition-shadow">
      </div>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 lg:py-12">
    <div id="count" class="text-xs sm:text-sm font-bold uppercase tracking-[0.2em] mb-4 sm:mb-6"></div>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 sm:gap-6 lg:gap-7">
      <div class="col-span-full text-center py-20 font-black uppercase tracking-[0.2em] text-ink/40">
        Carregando estoque...
      </div>
    </div>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="border-t-4 border-ink bg-ink text-white mt-8 sm:mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8 text-center">
      <p id="footerText" class="text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] text-white/60 mb-3"></p>
      <button onclick="load(true)" class="text-xs sm:text-sm font-black uppercase tracking-wider underline decoration-yellow decoration-2 underline-offset-4 hover:text-yellow transition-colors">
        ↻ Atualizar Agora
      </button>
    </div>
  </footer>

  <!-- ============ SCRIPT ============ -->
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzrcXMa7mxzOLhikg9E4MxvjQMtLNawa8HIgUlRc46KIHFCcl3w4eYUBTil6prxEtzM/exec';

    let data = { apple: [], xiaomi: [], month: '', whatsapp: '', lastUpdate: '' };
    let currentBrand = 'apple';

    async function load(showSpinner) {
      if (showSpinner) {
        document.getElementById('grid').innerHTML =
          '<div class="col-span-full text-center py-20 font-black uppercase tracking-[0.2em] text-ink/40">Atualizando...</div>';
      }
      try {
        const res = await fetch(API_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        onLoad(json);
      } catch (err) {
        onError(err);
      }
    }

    function onLoad(result) {
      data = result;
      document.getElementById('subtitle').textContent =
        'ESTOQUE ' + result.month + ' · ATUALIZADO ' + result.lastUpdate;
      document.getElementById('footerText').textContent =
        'Atualização automática a cada 60s · Última: ' + result.lastUpdate;
      render();
    }

    function onError(err) {
      document.getElementById('grid').innerHTML =
        '<div class="col-span-full text-center py-20 font-black uppercase tracking-[0.2em] text-red-700">⚠ ERRO: ' + (err.message || err) + '</div>';
    }

    function setBrand(brand) {
      currentBrand = brand;
      const apple = document.getElementById('btn-apple');
      const xiaomi = document.getElementById('btn-xiaomi');
      if (brand === 'apple') {
        apple.classList.add('bg-yellow'); apple.classList.remove('bg-white');
        xiaomi.classList.add('bg-white'); xiaomi.classList.remove('bg-yellow');
      } else {
        xiaomi.classList.add('bg-yellow'); xiaomi.classList.remove('bg-white');
        apple.classList.add('bg-white'); apple.classList.remove('bg-yellow');
      }
      document.getElementById('search').value = '';
      render();
    }

    function render() {
      const list = data[currentBrand] || [];
      const search = document.getElementById('search').value.trim().toLowerCase();
      const filtered = search
        ? list.filter(it => (it.modelo + ' ' + it.cor).toLowerCase().includes(search))
        : list;

      const grid = document.getElementById('grid');
      const count = document.getElementById('count');

      if (filtered.length === 0) {
        count.textContent = '';
        grid.innerHTML = '<div class="col-span-full text-center py-20 font-black uppercase tracking-[0.2em] text-ink/40">' +
          (search ? 'Nenhum produto encontrado' : 'Nenhum produto em estoque') +
          '</div>';
        return;
      }

      const totalUnits = currentBrand === 'xiaomi'
        ? filtered.reduce((s, it) => s + (it.quantity || 1), 0)
        : filtered.length;

      count.textContent = totalUnits + (totalUnits === 1 ? ' UNIDADE DISPONÍVEL' : ' UNIDADES DISPONÍVEIS');
      grid.innerHTML = filtered.map((item, i) => card(item, i)).join('');
    }

    // Geometric corner decorations (rotated by index)
    function corner(i) {
      const variants = [
        // Yellow circle
        '<div class="absolute -top-2.5 -right-2.5 w-5 h-5 bg-yellow border-2 border-ink rounded-full"></div>',
        // Blue square
        '<div class="absolute -top-2.5 -right-2.5 w-5 h-5 bg-blue border-2 border-ink"></div>',
        // Yellow triangle
        '<svg class="absolute -top-2.5 -right-2.5 w-6 h-6" viewBox="0 0 20 20"><polygon points="10,1 19,18 1,18" fill="#F0C020" stroke="#121212" stroke-width="2" stroke-linejoin="round"/></svg>',
      ];
      return variants[i % variants.length];
    }

    function card(item, i) {
      const isApple = item.brand === 'apple';
      const meta = isApple
        ? capitalize(item.cor) + (item.bateria !== null ? ' · BAT ' + item.bateria + '%' : '')
        : capitalize(item.cor);

      const qtyBadge = !isApple && item.quantity > 1
        ? '<span class="inline-flex items-center self-start bg-blue text-white px-2.5 py-1 text-[10px] font-black uppercase tracking-wider border-2 border-ink mb-3">✓ ' + item.quantity + ' unid.</span>'
        : '';

      const wppMsg = buildWhatsAppMessage(item);
      const wppLink = 'https://wa.me/' + data.whatsapp + '?text=' + encodeURIComponent(wppMsg);

      return '' +
        '<article class="lift relative bg-white border-2 sm:border-4 border-ink shadow-[6px_6px_0px_0px_#121212] sm:shadow-[8px_8px_0px_0px_#121212] p-5 sm:p-6 flex flex-col">' +
          corner(i) +
          '<h3 class="text-lg sm:text-xl font-black uppercase leading-tight tracking-tight mb-1.5">' + escapeHtml(item.modelo) + '</h3>' +
          '<p class="text-xs sm:text-sm font-bold uppercase tracking-wider text-ink/70 mb-3">' + escapeHtml(meta) + '</p>' +
          qtyBadge +
          '<p class="text-[10px] font-mono text-ink/30 mt-auto mb-4 tracking-wider">REF: ' + escapeHtml(item.code) + '</p>' +
          '<a href="' + wppLink + '" target="_blank" rel="noopener" ' +
            'class="press bg-[#25D366] text-white border-2 sm:border-[3px] border-ink shadow-[4px_4px_0px_0px_#121212] py-2.5 sm:py-3 px-4 text-center font-black uppercase tracking-wider text-sm flex items-center justify-center gap-2">' +
            '<svg viewBox="0 0 24 24" class="w-4 h-4 fill-current"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>' +
            'Falar no WhatsApp' +
          '</a>' +
        '</article>';
    }

    function buildWhatsAppMessage(item) {
      const isApple = item.brand === 'apple';
      const battery = isApple && item.bateria !== null ? ' (Bateria ' + item.bateria + '%)' : '';
      const desc = item.modelo + ' ' + capitalize(item.cor) + battery;
      return 'Olá! Tenho interesse no ' + desc +
             '. Pode me passar o valor?\n\nRef: ' + item.code;
    }

    function capitalize(s) {
      if (!s) return '';
      return String(s).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    load();
    setInterval(() => load(false), 60000);
  </script>
</body>
</html>
